name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Build Date
        run: echo "BUILD_DATE=$(TZ=Asia/Shanghai date +'%Y%m%d.%H%M')" >> "$GITHUB_ENV"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Device (Unsigned)
        run: |
          xcodebuild \
            -project BaoJunKeyless.xcodeproj \
            -scheme BaoJunKeyless \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COPY_PHASE_STRIP=NO \
            CURRENT_PROJECT_VERSION="$BUILD_DATE"

      - name: Compile AppIcon asset catalog
        run: |
          set -euo pipefail
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          ACTOOL=$(xcrun --find actool)
          echo "Using actool: $ACTOOL"
          # 显式把 Assets.xcassets 编译成 Assets.car，并生成 AppIcon
          # XcodeGen/resources 有时不会触发 actool，导致桌面图标空白
          "$ACTOOL" Assets.xcassets \
            --compile "$APP" \
            --platform iphoneos \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /tmp/assetcatalog_generated_info.plist \
            --compress-pngs \
            --notices --warnings
          ls -lh "$APP/Assets.car"
          # 合并 actool 生成的图标相关 Info.plist 键（若有）
          if [ -f /tmp/assetcatalog_generated_info.plist ]; then
            echo "actool partial info:"
            plutil -p /tmp/assetcatalog_generated_info.plist || true
            # 用 PlistBuddy 把 CFBundleIcons 等键合并进 app Info.plist（存在才合并）
            /usr/libexec/PlistBuddy -c 'Print :CFBundleIcons' /tmp/assetcatalog_generated_info.plist >/dev/null 2>&1 && \
              /usr/libexec/PlistBuddy -c 'Delete :CFBundleIcons' "$APP/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c 'Print :CFBundleIcons' /tmp/assetcatalog_generated_info.plist >/dev/null 2>&1 && \
              /usr/libexec/PlistBuddy -c "Merge /tmp/assetcatalog_generated_info.plist" "$APP/Info.plist" || true
          fi
          # 清理可能残留的未编译 asset 源目录，避免干扰
          rm -rf "$APP/Assets.xcassets" || true

      - name: Inspect .app
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          find "$APP" -maxdepth 2 -ls
          file "$APP/BaoJunKeyless" || echo "NO BINARY"
          ls -lh "$APP" || echo "NO APP DIR"
          if [ ! -f "$APP/Assets.car" ]; then
            echo "ERROR: Assets.car still missing after actool"
            exit 1
          fi
          ls -lh "$APP/Assets.car"
          plutil -p "$APP/Info.plist" | sed -n '1,120p'

      - name: Re-sign with TrollStore entitlements
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          ENTITLEMENTS="BaoJunKeyless.entitlements"
          # 删除旧签名
          codesign --remove-signature "$APP" 2>/dev/null || true
          # 用 entitlements 重新签名
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP"
          # 验证签名
          codesign -d --entitlements - "$APP" 2>&1 | head -20

      - name: Package IPA
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -r -y BaoJunKeyless.ipa Payload
          ls -lh BaoJunKeyless.ipa
          unzip -l BaoJunKeyless.ipa | grep "BaoJunKeyless.app/BaoJunKeyless"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaoJunKeyless-IPA
          path: BaoJunKeyless.ipa
          retention-days: 90
