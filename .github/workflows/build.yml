name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Create Temp Signing Identity
        run: |
          # Generate self-signed cert
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 30 -nodes -subj "/CN=TempSigner"
          openssl pkcs12 -export \
            -in /tmp/cert.pem -inkey /tmp/key.pem \
            -out /tmp/adhoc.p12 -password pass:t

          # Create keychain
          KC=$RUNNER_TEMP/build.keychain-db
          KP=$(openssl rand -base64 24)
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          security import /tmp/adhoc.p12 -P "t" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KP" "$KC"
          security list-keychains -d user -s "$KC" login.keychain-db

          # Verify identity exists
          security find-identity -v -p codesigning "$KC"
          ID=$(security find-identity -v -p codesigning "$KC" | head -1 | awk -F'"' '{print $2}')
          echo "SIGN_IDENTITY=$ID" >> $GITHUB_ENV
          echo "==> Using identity: $ID"

      - name: Build for Device
        run: |
          set -o pipefail
          xcodebuild \
            -project BaoJunKeyless.xcodeproj \
            -scheme BaoJunKeyless \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            ENABLE_BITCODE=NO \
            2>&1 | xcpretty --color

      - name: Package IPA
        run: |
          set -ex
          APP=build/DerivedData/Build/Products/Release-iphoneos/BaoJunKeyless.app
          echo "=== .app contents ==="
          ls -la "$APP/"

          # Ensure binary exists
          test -f "$APP/BaoJunKeyless"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r -y BaoJunKeyless.ipa Payload
          ls -lh BaoJunKeyless.ipa
          echo "=== IPA contents ==="
          unzip -l BaoJunKeyless.ipa | grep "BaoJunKeyless$"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaoJunKeyless-IPA
          path: BaoJunKeyless.ipa
          retention-days: 90
