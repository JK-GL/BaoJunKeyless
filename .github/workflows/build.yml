name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Build Date
        run: echo "BUILD_DATE=$(TZ=Asia/Shanghai date +'%Y%m%d.%H%M')" >> "$GITHUB_ENV"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Device (Unsigned)
        run: |
          xcodebuild \
            -project BaoJunKeyless.xcodeproj \
            -scheme BaoJunKeyless \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COPY_PHASE_STRIP=NO \
            CURRENT_PROJECT_VERSION="$BUILD_DATE"

      - name: Compile AppIcon asset catalog
        run: |
          set -euo pipefail
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          ICONSET=Assets.xcassets/AppIcon.appiconset
          ACTOOL=$(xcrun --find actool)
          echo "Using actool: $ACTOOL"

          # 1) 编译 Assets.car
          "$ACTOOL" Assets.xcassets \
            --compile "$APP" \
            --platform iphoneos \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /tmp/assetcatalog_generated_info.plist \
            --compress-pngs \
            --notices --warnings
          ls -lh "$APP/Assets.car"

          # 2) 学第三方 Wuling：根目录只放最小必要图标，不塞 1024 / 全尺寸重复
          # Wuling 实测只有 AppIcon60x60@2x.png（约 11KB）+ 可选 iPad
          cp -f "$ICONSET/ivan.p@example.net" "$APP/AppIcon60x60@2x.png"
          cp -f "$ICONSET/quinn.m@example.net" "$APP/AppIcon60x60@3x.png"

          # 3) Info.plist 只声明 AppIcon60x60
          /usr/libexec/PlistBuddy -c 'Delete :CFBundleIconName' "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c 'Delete :CFBundleIcons' "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c 'Delete :CFBundleIconFiles' "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIconName string AppIcon' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIconFiles array' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIconFiles:0 string AppIcon60x60' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons dict' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons:CFBundlePrimaryIcon dict' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60' "$APP/Info.plist"

          if [ -f /tmp/assetcatalog_generated_info.plist ]; then
            echo "actool partial info:"
            plutil -p /tmp/assetcatalog_generated_info.plist || true
          fi

          # 清理未编译 asset 源目录
          rm -rf "$APP/Assets.xcassets" || true

          echo "Root icon files (Wuling-style minimal):"
          ls -lh "$APP"/AppIcon60x60*.png
          # 明确不应存在的大文件
          if [ -f "$APP/AppIcon.png" ] || [ -f "$APP/iTunesArtwork@2x" ]; then
            echo "ERROR: fat marketing icons leaked into app root"
            exit 1
          fi


      - name: Inspect .app
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          find "$APP" -maxdepth 2 -ls
          file "$APP/BaoJunKeyless" || echo "NO BINARY"
          ls -lh "$APP" || echo "NO APP DIR"
          if [ ! -f "$APP/Assets.car" ]; then
            echo "ERROR: Assets.car still missing after actool"
            exit 1
          fi
          ls -lh "$APP/Assets.car"
          # Wuling 风格：只要求 60pt 根图标 + Assets.car
          test -f "$APP/AppIcon60x60@2x.png"
          test -f "$APP/AppIcon60x60@3x.png"
          test ! -f "$APP/AppIcon.png"
          test ! -f "$APP/iTunesArtwork@2x"
          plutil -p "$APP/Info.plist" | sed -n '1,160p'

      - name: Re-sign with TrollStore entitlements
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          ENTITLEMENTS="BaoJunKeyless.entitlements"
          # 删除旧签名
          codesign --remove-signature "$APP" 2>/dev/null || true
          # 用 entitlements 重新签名
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP"
          # 验证签名
          codesign -d --entitlements - "$APP" 2>&1 | head -20

      - name: Package IPA
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -r -y BaoJunKeyless.ipa Payload
          ls -lh BaoJunKeyless.ipa
          unzip -l BaoJunKeyless.ipa | grep "BaoJunKeyless.app/BaoJunKeyless"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaoJunKeyless-IPA
          path: BaoJunKeyless.ipa
          retention-days: 90
