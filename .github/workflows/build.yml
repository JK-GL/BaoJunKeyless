name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build .app (No Signing)
        run: |
          xcodebuild \
            -project BaoJunKeyless.xcodeproj \
            -scheme BaoJunKeyless \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            | xcpretty --color

      - name: Package Unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "BaoJunKeyless.app" -type d | head -1)
          echo "APP: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y BaoJunKeyless-unsigned.ipa Payload
          ls -lh BaoJunKeyless-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaoJunKeyless-unsigned
          path: BaoJunKeyless-unsigned.ipa
          retention-days: 90
