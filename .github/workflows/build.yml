name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Device (Unsigned)
        run: |
          xcodebuild \
            -project BaoJunKeyless.xcodeproj \
            -scheme BaoJunKeyless \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO \
            COPY_PHASE_STRIP=NO 2>&1 | tail -30

      - name: Inspect .app
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          find "$APP" -maxdepth 1 -ls
          file "$APP/BaoJunKeyless" || echo "NO BINARY"

      - name: Package IPA
        run: |
          APP=build/Build/Products/Release-iphoneos/BaoJunKeyless.app
          codesign --force --deep --sign - "$APP" || true
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -r -y BaoJunKeyless.ipa Payload
          ls -lh BaoJunKeyless.ipa
          unzip -l BaoJunKeyless.ipa | grep "BaoJunKeyless.app/BaoJunKeyless"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaoJunKeyless-IPA
          path: BaoJunKeyless.ipa
          retention-days: 90
