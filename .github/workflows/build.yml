name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Create Temp Signing Identity
        run: |
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 30 -nodes -subj "/CN=AdHoc Signer"
          openssl pkcs12 -export \
            -in /tmp/cert.pem -inkey /tmp/key.pem \
            -out /tmp/adhoc.p12 -password pass:temppass

          KEYCHAIN=$RUNNER_TEMP/adhoc.keychain-db
          KC_PASS=$(openssl rand -base64 24)
          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"
          security import /tmp/adhoc.p12 -P "temppass" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KC_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "AdHoc" | awk -F'"' '{print $2}')
          echo "SIGN_IDENTITY=$IDENTITY" >> $GITHUB_ENV

      - name: Build for Device
        run: |
          xcodebuild \
            -project BaoJunKeyless.xcodeproj \
            -scheme BaoJunKeyless \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            ENABLE_BITCODE=NO \
            | xcpretty --color || true

      - name: Package IPA (Manual)
        run: |
          APP_PATH=$(find build/DerivedData -name "BaoJunKeyless.app" -type d | head -1)
          echo "APP: $APP_PATH"
          ls -la "$APP_PATH/"

          # Re-sign with ad-hoc
          /usr/bin/codesign --force --sign "$SIGN_IDENTITY" \
            --entitlements /dev/null "$APP_PATH"

          # Create IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y BaoJunKeyless.ipa Payload

          ls -lh BaoJunKeyless.ipa
          echo "--- contents ---"
          unzip -l BaoJunKeyless.ipa | tail -15

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaoJunKeyless-IPA
          path: BaoJunKeyless.ipa
          retention-days: 90
